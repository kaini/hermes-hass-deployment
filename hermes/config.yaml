name: "Hermes Agent"
description: "A deployment configuration for Hermes Agent as a Home Assistant app."
version: "1.0.5"
slug: "hermes-hass-deployment"
init: false
arch:
  - amd64
map:
  - type: data
    read_only: false
    path: /opt/data
ports:
  8642/tcp: 8642
environment:
  API_SERVER_ENABLED: "true"
  API_SERVER_HOST: "0.0.0.0"
  API_SERVER_CORS_ORIGINS: "*"
options:
  api_server_key: null
  dashboard_username: null
  dashboard_password: null
  dashboard_secret: null
schema:
  api_server_key: password
  dashboard_username: str
  dashboard_password: password
  dashboard_secret: password
