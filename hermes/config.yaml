name: "Hermes Agent"
description: "A deployment configuration for Hermes Agent as a Home Assistant app."
version: "1.0.13"
slug: "hermes-hass-deployment"
init: false
arch:
  - amd64
  - aarch64
map:
  - type: data
    read_only: false
    path: /opt/data
  - type: ssl
ports:
  8642/tcp: 8642
  9119/tcp: 9119
environment:
  API_SERVER_HOST: "127.0.0.1"
  API_SERVER_PORT: "18643"
  API_SERVER_CORS_ORIGINS: "*"
  HERMES_DASHBOARD: "true"
  HERMES_DASHBOARD_HOST: "127.0.0.1"
  HERMES_DASHBOARD_PORT: "19119"
options:
  dashboard:
    username: ""
    password: ""
  api_server:
    enabled: false
    key: ""
  ssl:
    enabled: false
    certfile: ""
    keyfile: ""
schema:
  dashboard:
    username: str
    password: password
  api_server:
    enabled: bool
    key: password
  ssl:
    enabled: bool
    certfile: str
    keyfile: str
